name: Deploy naar GitHub Pages

# Draait automatisch bij elke push naar "main", en is ook handmatig te
# starten via het "Actions"-tabblad op GitHub ("Run workflow").
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Voorkomt dat twee deploys tegelijk lopen
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repository ophalen
        uses: actions/checkout@v4

      - name: Node.js instellen
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Dependencies installeren
        run: npm install

      - name: Site builden (incl. prerender naar statische HTML)
        run: npm run build

      - name: GitHub Pages voorbereiden
        uses: actions/configure-pages@v5

      - name: Build-output uploaden
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Naar GitHub Pages publiceren
        id: deployment
        uses: actions/deploy-pages@v4
